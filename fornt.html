<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg-top: #f5f0e6;
			--bg-mid: #dce9f2;
			--bg-bottom: #f8f9fb;
			--card: #ffffffcc;
			--ink: #1f2a37;
			--muted: #556272;
			--accent: #d64f2b;
			--accent-strong: #b53f20;
			--line: #d6dde5;
			--ok: #23785f;
			--shadow: 0 20px 50px rgba(25, 41, 58, 0.18);
			--radius: 18px;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Manrope", "Segoe UI", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 18% 18%, #ffffffaa 0 12%, transparent 13%),
				radial-gradient(circle at 82% 75%, #ffffffa0 0 10%, transparent 11%),
				linear-gradient(165deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
			display: grid;
			place-items: center;
			padding: 28px;
			overflow-x: hidden;
		}

		.scene {
			width: min(980px, 100%);
			display: grid;
			grid-template-columns: 1fr 1fr;
			background: var(--card);
			border: 1px solid #ffffff;
			border-radius: calc(var(--radius) + 6px);
			backdrop-filter: blur(10px);
			box-shadow: var(--shadow);
			overflow: hidden;
			animation: rise 700ms ease-out both;
		}

		.brand {
			padding: 42px;
			background:
				linear-gradient(160deg, #243447 0%, #30475e 56%, #3f5f7a 100%);
			color: #eef3f7;
			position: relative;
			isolation: isolate;
		}

		.brand::before,
		.brand::after {
			content: "";
			position: absolute;
			border-radius: 999px;
			z-index: -1;
			filter: blur(1px);
		}

		.brand::before {
			width: 260px;
			height: 260px;
			background: #f5a62333;
			right: -70px;
			top: -70px;
		}

		.brand::after {
			width: 180px;
			height: 180px;
			background: #8ecae633;
			left: -35px;
			bottom: -45px;
		}

		.logo {
			width: fit-content;
			font-family: "Space Grotesk", sans-serif;
			font-weight: 700;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			padding: 8px 12px;
			border-radius: 999px;
			border: 1px solid #ffffff55;
			margin-bottom: 28px;
			font-size: 0.78rem;
		}

		.brand h1 {
			font-family: "Space Grotesk", sans-serif;
			font-size: clamp(1.65rem, 2vw + 1rem, 2.45rem);
			line-height: 1.08;
			margin: 0 0 14px;
			max-width: 12ch;
		}

		.brand p {
			margin: 0;
			color: #d6e2ec;
			max-width: 32ch;
			line-height: 1.6;
		}

		.panel {
			padding: 42px;
			background: #fcfdff;
			display: flex;
			align-items: center;
		}

		.login {
			width: 100%;
			animation: fade 600ms ease-out 160ms both;
		}

		.login h2 {
			margin: 0 0 8px;
			font-family: "Space Grotesk", sans-serif;
			font-size: 1.75rem;
			letter-spacing: -0.015em;
		}

		.subtitle {
			margin: 0 0 24px;
			color: var(--muted);
			line-height: 1.5;
		}

		.field {
			margin-bottom: 16px;
		}

		.field label {
			display: inline-block;
			margin-bottom: 7px;
			font-size: 0.92rem;
			font-weight: 600;
		}

		.input-wrap {
			position: relative;
		}

		.input-wrap input {
			width: 100%;
			border: 1px solid var(--line);
			border-radius: 12px;
			padding: 12px 14px;
			font: inherit;
			color: var(--ink);
			background: #fff;
			transition: border-color 180ms ease, box-shadow 180ms ease;
		}

		.input-wrap input:focus {
			outline: none;
			border-color: #8aa6bd;
			box-shadow: 0 0 0 4px #d8e7f388;
		}

		.input-wrap input.invalid {
			border-color: #c13838;
			box-shadow: 0 0 0 4px #f9d8d888;
		}

		.error-text {
			display: block;
			min-height: 1.1em;
			margin-top: 6px;
			font-size: 0.84rem;
			color: #b42323;
		}

		.meta {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-top: 8px;
			margin-bottom: 22px;
			font-size: 0.92rem;
			color: var(--muted);
		}

		.remember {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			cursor: pointer;
			user-select: none;
		}

		.remember input {
			accent-color: #2f4f67;
		}

		.link {
			color: #2f4f67;
			text-decoration: none;
			font-weight: 600;
		}

		.link:hover {
			text-decoration: underline;
		}

		.btn {
			width: 100%;
			border: none;
			border-radius: 12px;
			padding: 13px 16px;
			font: inherit;
			font-weight: 700;
			color: #fff;
			background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
			cursor: pointer;
			transition: transform 120ms ease, filter 180ms ease;
		}

		.btn:hover {
			filter: saturate(1.08) brightness(1.03);
			transform: translateY(-1px);
		}

		.btn:active {
			transform: translateY(0);
		}

		.btn[disabled] {
			opacity: 0.7;
			cursor: not-allowed;
			transform: none;
		}

		.form-status {
			margin: 14px 0 0;
			padding: 10px 12px;
			border-radius: 10px;
			font-size: 0.9rem;
			display: none;
		}

		.form-status.show {
			display: block;
		}

		.form-status.error {
			background: #fce8e8;
			color: #8f1f1f;
			border: 1px solid #f2c4c4;
		}

		.form-status.success {
			background: #e7f6ef;
			color: #136545;
			border: 1px solid #bfe6d4;
		}

		.hint {
			margin: 18px 0 0;
			font-size: 0.9rem;
			color: var(--ok);
		}

		.footer {
			margin-top: 18px;
			font-size: 0.92rem;
			color: var(--muted);
		}

		.footer a {
			color: #2f4f67;
			text-underline-offset: 2px;
			font-weight: 600;
		}

		@keyframes rise {
			from {
				opacity: 0;
				transform: translateY(14px) scale(0.985);
			}
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		@keyframes fade {
			from {
				opacity: 0;
				transform: translateX(8px);
			}
			to {
				opacity: 1;
				transform: translateX(0);
			}
		}

		@media (max-width: 860px) {
			.scene {
				grid-template-columns: 1fr;
			}

			.brand,
			.panel {
				padding: 30px;
			}

			.brand h1 {
				max-width: 20ch;
			}
		}

		@media (max-width: 480px) {
			body {
				padding: 16px;
			}

			.brand,
			.panel {
				padding: 24px;
			}

			.login h2 {
				font-size: 1.48rem;
			}
		}
	</style>
</head>
<body>
	<main class="scene" aria-label="Login page layout">
		<section class="brand" aria-label="Branding panel">
			<div class="logo">Skyline ID</div>
			<h1>Welcome back to your workspace.</h1>
			<p>Sign in to access your projects, team updates, and personalized dashboard.</p>
		</section>

		<section class="panel" aria-label="Login form panel">
			<form class="login" action="#" method="post" novalidate>
				<h2>Sign in</h2>
				<p class="subtitle">Use your email and password to continue.</p>

				<div class="field">
					<label for="email">Email</label>
					<div class="input-wrap">
						<input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required />
					</div>
					<small class="error-text" id="emailError" aria-live="polite"></small>
				</div>

				<div class="field">
					<label for="password">Password</label>
					<div class="input-wrap">
						<input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required />
					</div>
					<small class="error-text" id="passwordError" aria-live="polite"></small>
				</div>

				<div class="meta">
					<label class="remember">
						<input type="checkbox" name="remember" />
						Remember me
					</label>
					<a class="link" href="#">Forgot password?</a>
				</div>

				<button class="btn" type="submit">Log in</button>
				<p class="form-status" id="formStatus" aria-live="polite"></p>
				<p class="hint">Secure login enabled.</p>
				<p class="footer">New here? <a href="#">Create an account</a></p>
			</form>
		</section>
	</main>

	<script>
		const LOGIN_ENDPOINT = "/api/login";

		const form = document.querySelector(".login");
		const emailInput = document.getElementById("email");
		const passwordInput = document.getElementById("password");
		const emailError = document.getElementById("emailError");
		const passwordError = document.getElementById("passwordError");
		const statusBox = document.getElementById("formStatus");
		const submitButton = form.querySelector("button[type='submit']");

		const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

		function setFieldError(input, errorElement, message) {
			errorElement.textContent = message;
			input.classList.toggle("invalid", Boolean(message));
		}

		function setStatus(message, type) {
			statusBox.textContent = message;
			statusBox.classList.remove("error", "success", "show");
			if (message) {
				statusBox.classList.add(type, "show");
			}
		}

		function validateForm() {
			let valid = true;

			if (!emailInput.value.trim()) {
				setFieldError(emailInput, emailError, "Email is required.");
				valid = false;
			} else if (!emailPattern.test(emailInput.value.trim())) {
				setFieldError(emailInput, emailError, "Enter a valid email address.");
				valid = false;
			} else {
				setFieldError(emailInput, emailError, "");
			}

			if (!passwordInput.value) {
				setFieldError(passwordInput, passwordError, "Password is required.");
				valid = false;
			} else if (passwordInput.value.length < 8) {
				setFieldError(passwordInput, passwordError, "Password must be at least 8 characters.");
				valid = false;
			} else {
				setFieldError(passwordInput, passwordError, "");
			}

			return valid;
		}

		emailInput.addEventListener("input", () => {
			if (emailInput.classList.contains("invalid")) {
				validateForm();
			}
		});

		passwordInput.addEventListener("input", () => {
			if (passwordInput.classList.contains("invalid")) {
				validateForm();
			}
		});

		form.addEventListener("submit", async (event) => {
			event.preventDefault();
			setStatus("", "error");

			if (!validateForm()) {
				setStatus("Please fix the highlighted fields and try again.", "error");
				return;
			}

			submitButton.disabled = true;
			submitButton.textContent = "Logging in...";

			const payload = {
				email: emailInput.value.trim(),
				password: passwordInput.value,
				remember: form.elements.remember.checked
			};

			try {
				const response = await fetch(LOGIN_ENDPOINT, {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					   body: JSON.stringify(payload)
				});

				if (!response.ok) {
					throw new Error("Invalid credentials or server error.");
				}

				setStatus("Login successful. Redirecting...", "success");
				setTimeout(() => {
					window.location.href = "/dashboard";
				}, 700);
			} catch (error) {
				setStatus(error.message || "Unable to log in right now.", "error");
			} finally {
				submitButton.disabled = false;
				submitButton.textContent = "Log in";
			}
		});
	</script>
</body>
</html>
